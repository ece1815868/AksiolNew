<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axiologiseis App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #333;
    }

    .button {
      display: block;
      width: 100%;
      padding: 12px 0;
      margin: 10px 0;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      text-decoration: none;
    }

    .button-create {
      background-color: #007bff;
    }

    .button-create:hover {
      background-color: #0056b3;
    }

    .button-list {
      background-color: #28a745;
    }

    .button-list:hover {
      background-color: #1e7e34;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Αξιολογήσεις Πυρασφάλειας</h1>
    <a href="add.html" class="button button-create">➕ Προσθήκη δραστηριότητας</a>
    <a href="list.html" class="button button-list">📋 Προβολή αξιολογήσεων</a>
  </div>

</body>
</html>
