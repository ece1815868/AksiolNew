<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Edit Axiologisi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px 20px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    label {
      display: flex;
      flex-direction: column;
      font-weight: bold;
    }

    input {
      padding: 6px 10px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      grid-column: span 2;
      padding: 10px;
      background: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #218838;
    }

    .back-wrapper {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      top: 10px;
    }
  </style>
</head>

<body>

  <h2 id="pageTitle">Επεξεργασία</h2>

  <div class="back-wrapper">
    <button type="button"
      class="back-btn"
      onclick="history.back()">
      ⬅ Επιστροφή
    </button>
  </div>

  <form id="editForm">
    <label>Α/Α e-adeies
      <input name="aa_aitisis"
        type="text"
        required>
    </label>

    <label>Ημερομηνία τελευταίας αξιολόγησης/ελέγχου
      <input name="imnia"
        type="date"
        required>
    </label>

    <label>Ημερομηνία Πράξης
      <input name="imnia_praxis"
        type="date">
    </label>

    <label>Επωνυμία
      <input name="eponimia"
        type="text"
        required>
    </label>

    <label>Είδος δραστηριότητας
      <input name="eidos_drast"
        type="text">
    </label>

    <label>Περιφέρεια
      <input name="perifereia"
        type="text">
    </label>

    <label>Περιοχή
      <input name="perioxi"
        type="text">
    </label>

    <label>Οδός
      <input name="odos"
        type="text">
    </label>

    <label>TK
      <input name="tk"
        type="text">
    </label>

    <label>Τηλέφωνο
      <input name="tilefono"
        type="text">
    </label>

    <label>eMail
      <input name="email"
        type="email">
    </label>

    <label>Αξιολόγηση 1ου Επιπέδου
      <select name="axiologisi_lvl1">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <label>Αξιολόγηση 2ου Επιπέδου
      <select name="axiologisi_lvl2">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <label>Αξιολόγηση 3ου Επιπέδου
      <select name="axiologisi_lvl3">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <label>
      Μετεγενέστερη - νεότερη Πράξη
      <input id="recordLookup"
        name="metegenesteri_praxi"
        type="text"
        list="recordLookupList"
        placeholder="π.χ. 22"
        autocomplete="off">
      <datalist id="recordLookupList"></datalist>
    </label>

    <button type="submit">Αποθήκευση</button>

    <button type="button"
      id="addElegxosBtn"
      style="background:#0d6efd;">
      ➕ Προσθήκη Ελέγχου
    </button>

  </form>

  <hr style="margin: 20px 0;" />

  <section id="elegxoiSection">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <h3 style="margin:0;">Ιστορικό Ελέγχων</h3>
      <button type="button"
        id="refreshElegxoiBtn">🔄 Ανανέωση</button>
    </div>

    <div style="margin-top:10px; overflow:auto;">
      <table border="1"
        cellpadding="6"
        cellspacing="0"
        style="width:100%; background:white;">
        <thead>
          <tr>
            <th>Ημ/νία</th>
            <th>Επίπεδο</th>
            <th>Συμμόρφωση</th>
            <th>Πρόστιμο</th>
            <th>Αξιωματικοί</th>
            <th>Προθεσμία</th>
            <th>Παρατηρήσεις</th>
            <th>Ενέργειες</th>
          </tr>
        </thead>
        <tbody id="elegxoiTbody">
          <tr>
            <td colspan="8">—</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script>
    // ================================
    // ΒΑΣΙΚΑ ΣΤΟΙΧΕΙΑ ΣΕΛΙΔΑΣ
    // ================================

    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');

    const form = document.getElementById('editForm');
    const recordLookupInput = document.getElementById('recordLookup');
    const recordLookupList = document.getElementById('recordLookupList');
    const addElegxosBtn = document.getElementById('addElegxosBtn');
    const refreshElegxoiBtn = document.getElementById('refreshElegxoiBtn');
    const elegxoiTbody = document.getElementById('elegxoiTbody');

    // Κατάσταση για lazy loading του datalist
    let lookupLoaded = false;
    let lookupLoading = false;

    // ================================
    // ΑΡΧΙΚΟΠΟΙΗΣΗ
    // ================================

    init();

    function init() {
      bindEvents();
      loadRecord();
    }

    function bindEvents() {
      // Lazy loading του datalist μόνο όταν ο χρήστης μπει στο input
      recordLookupInput.addEventListener('focus', loadLookupOptionsOnce);

      // Όταν ο χρήστης επιλέξει/γράψει τιμή στο helper input,
      // κρατάμε μόνο το πρώτο id
      recordLookupInput.addEventListener('change', handleLookupChange);

      // Υποβολή φόρμας ενημέρωσης
      form.addEventListener('submit', handleFormSubmit);

      // Μετάβαση σε νέα καταχώριση ελέγχου
      addElegxosBtn.addEventListener('click', handleAddElegxos);

      // Χειροκίνητη ανανέωση ιστορικού ελέγχων
      refreshElegxoiBtn.addEventListener('click', () => {
        loadElegxoiForAxiologisiId(recordId);
      });
    }

    // ================================
    // ΦΟΡΤΩΣΗ ΚΥΡΙΑΣ ΕΓΓΡΑΦΗΣ
    // ================================

    async function loadRecord() {
      if (!recordId) {
        alert('Δεν βρέθηκε id εγγραφής.');
        return;
      }

      try {
        const response = await fetch('/api/axiologiseis/' + encodeURIComponent(recordId));

        if (!response.ok) {
          alert('Σφάλμα φόρτωσης εγγραφής.');
          return;
        }

        const record = await response.json();

        document.getElementById('pageTitle').textContent =
          `Επεξεργασία Α/Α ${record.id}`;

        // Συμπλήρωση όλων των πεδίων της φόρμας που έχουν αντίστοιχο name
        for (const key in record) {
          if (form.elements[key]) {
            form.elements[key].value = record[key] ?? '';
          }
        }

        // Φόρτωση ιστορικού ελέγχων της εγγραφής
        await loadElegxoiForAxiologisiId(recordId);

      } catch (err) {
        console.error('Σφάλμα loadRecord:', err);
        alert('Παρουσιάστηκε σφάλμα κατά τη φόρτωση της εγγραφής.');
      }
    }

    // ================================
    // LOOKUP / DATALIST ΒΟΗΘΗΤΙΚΗΣ ΑΝΑΖΗΤΗΣΗΣ
    // ================================

    // Δημιουργεί το κείμενο που θα εμφανίζεται στο datalist
    // π.χ. "22 - 123456 - 2026-04-01 - ΕΠΩΝΥΜΙΑ - Οδός, Δ. Περιοχή"
    function buildLookupLabel(record) {
      const addressPart = [record.odos || '', record.perioxi ? `Δ. ${record.perioxi}` : '']
        .filter(Boolean)
        .join(', ');

      const parts = [
        record.id,
        record.aa_aitisis || '',
        record.imnia || '',
        record.eponimia || '',
        addressPart
      ].filter(Boolean);

      return parts.join(' - ');
    }

    // Παίρνει τον πρώτο αριθμό από την αρχή του κειμένου
    // π.χ. "22 - εταιρεία - οδός" -> "22"
    function extractFirstId(text) {
      const match = String(text || '').match(/^\s*(\d+)\b/);
      return match ? match[1] : '';
    }

    // Escape ειδικών χαρακτήρων ώστε να μπαίνουν με ασφάλεια μέσα σε HTML
    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Φορτώνει μία φορά τα options του datalist μόνο όταν ζητηθούν,
    // ώστε να μη βαραίνει άσκοπα η αρχική φόρτωση της σελίδας
    async function loadLookupOptionsOnce() {
      if (lookupLoaded || lookupLoading) return;

      lookupLoading = true;

      try {
        const res = await fetch('/api/axiologiseis');

        if (!res.ok) {
          throw new Error('Failed to load lookup records');
        }

        const rows = await res.json();

        recordLookupList.innerHTML = rows.map(record => {
          const label = escapeHtml(buildLookupLabel(record));
          return `<option value="${label}"></option>`;
        }).join('');

        lookupLoaded = true;

      } catch (err) {
        console.error('Σφάλμα loadLookupOptionsOnce:', err);
      } finally {
        lookupLoading = false;
      }
    }

    // Όταν ο χρήστης διαλέξει μια εγγραφή από το datalist,
    // το πεδίο κρατά μόνο το id
    function handleLookupChange() {
      const rawValue = recordLookupInput.value.trim();

      // Αν είναι άδειο, δεν κάνουμε τίποτα
      if (!rawValue) return;

      const id = extractFirstId(rawValue);

      if (!id) {
        alert("Δεν βρέθηκε έγκυρο id.");
        return;
      }

      recordLookupInput.value = id;
    }

    // ================================
    // ΥΠΟΒΟΛΗ ΦΟΡΜΑΣ ΕΝΗΜΕΡΩΣΗΣ
    // ================================

    async function handleFormSubmit(e) {
      e.preventDefault();

      try {
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const rawLookupValue = recordLookupInput.value.trim();
        data.metegenesteri_praxi = rawLookupValue ? extractFirstId(rawLookupValue) : '';

        if (
          data.metegenesteri_praxi &&
          Number(data.metegenesteri_praxi) === Number(recordId)
        ) {
          alert('Η μετεγενέστερη πράξη δεν μπορεί να είναι η ίδια εγγραφή.');
          return;
        }

        const response = await fetch('/api/axiologiseis/' + encodeURIComponent(recordId), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          alert('Επιτυχής ενημέρωση!');
          window.location.href = 'list.html';
        } else {
          alert('Σφάλμα κατά την ενημέρωση της εγγραφής.');
        }

      } catch (err) {
        console.error('Σφάλμα handleFormSubmit:', err);
        alert('Παρουσιάστηκε σφάλμα κατά την αποθήκευση.');
      }
    }

    // ================================
    // ΕΝΕΡΓΕΙΕΣ ΣΧΕΤΙΚΑ ΜΕ ΕΛΕΓΧΟΥΣ
    // ================================

    function handleAddElegxos() {
      if (!recordId) {
        alert('Δεν βρέθηκε το id της αξιολόγησης.');
        return;
      }

      window.location.href = `elegxos_new.html?axiologisi_id=${encodeURIComponent(recordId)}`;
    }

    async function loadElegxoiForAxiologisiId(axiologisiId) {
      elegxoiTbody.innerHTML = `<tr><td colspan="8">Φόρτωση...</td></tr>`;

      if (!axiologisiId) {
        elegxoiTbody.innerHTML = `<tr><td colspan="8">Δεν βρέθηκε id αξιολόγησης.</td></tr>`;
        return;
      }

      try {
        const resp = await fetch(`/api/elegxoi?axiologisi_id=${encodeURIComponent(axiologisiId)}`);

        if (!resp.ok) {
          elegxoiTbody.innerHTML = `<tr><td colspan="8">Σφάλμα ανάκτησης ελέγχων.</td></tr>`;
          return;
        }

        const rows = await resp.json();

        if (!rows.length) {
          elegxoiTbody.innerHTML = `<tr><td colspan="8">Δεν υπάρχουν έλεγχοι.</td></tr>`;
          return;
        }

        renderElegxoiRows(rows, axiologisiId);

      } catch (err) {
        console.error('Σφάλμα loadElegxoiForAxiologisiId:', err);
        elegxoiTbody.innerHTML = `<tr><td colspan="8">Σφάλμα ανάκτησης ελέγχων.</td></tr>`;
      }
    }

    function renderElegxoiRows(rows, axiologisiId) {
      elegxoiTbody.innerHTML = rows.map(row => {
        const symmorfosiText = Number(row.symmorfosi) ? 'ΝΑΙ' : 'ΟΧΙ';
        const prostimoText = Number(row.prostimo) ? 'ΝΑΙ' : 'ΟΧΙ';
        const prothesmiaText = row.prothesmia == null ? '' : row.prothesmia;
        const paratiriseisText = row.paratiriseis || '';
        const axiomatikoiText = row.axiomatikoi || '';

        return `
        <tr>
          <td>${row.imnia_elegxou || ''}</td>
          <td>${row.apotelesma_lvl3 || ''}</td>
          <td>${symmorfosiText}</td>
          <td>${prostimoText}</td>
          <td>${escapeHtml(axiomatikoiText)}</td>
          <td style="text-align:center;">${prothesmiaText}</td>
          <td style="white-space: pre-wrap; word-break: break-word;">${escapeHtml(paratiriseisText)}</td>
          <td>
            <button type="button" data-edit-elegxos-id="${row.id}">✏️ Επεξεργασία</button>
            <button type="button" data-del-elegxos-id="${row.id}">🗑 Διαγραφή</button>
          </td>
        </tr>
      `;
      }).join('');

      bindElegxoiRowEvents(axiologisiId);
    }

    function bindElegxoiRowEvents(axiologisiId) {
      // Κουμπιά διαγραφής ελέγχου
      elegxoiTbody.querySelectorAll('button[data-del-elegxos-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const elegxosId = btn.getAttribute('data-del-elegxos-id');

          if (!confirm('Να διαγραφεί αυτός ο έλεγχος;')) return;

          try {
            const delResp = await fetch(`/api/elegxoi/${encodeURIComponent(elegxosId)}`, {
              method: 'DELETE'
            });

            if (!delResp.ok) {
              alert('Σφάλμα διαγραφής.');
              return;
            }

            await loadElegxoiForAxiologisiId(axiologisiId);

          } catch (err) {
            console.error('Σφάλμα διαγραφής ελέγχου:', err);
            alert('Παρουσιάστηκε σφάλμα κατά τη διαγραφή.');
          }
        });
      });

      // Κουμπιά επεξεργασίας ελέγχου
      elegxoiTbody.querySelectorAll('button[data-edit-elegxos-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          const elegxosId = btn.getAttribute('data-edit-elegxos-id');
          window.location.href = `elegxos_edit.html?id=${encodeURIComponent(elegxosId)}`;
        });
      });
    }
  </script>

</body>

</html>
