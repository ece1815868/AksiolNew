<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Edit Axiologisi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px 20px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    label {
      display: flex;
      flex-direction: column;
      font-weight: bold;
    }

    input {
      padding: 6px 10px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      grid-column: span 2;
      padding: 10px;
      background: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #218838;
    }

    .back-wrapper {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      top: 10px;
    }
  </style>
</head>

<body>

  <h2>Επεξεργασία</h2>

  <div class="back-wrapper">
    <button type="button"
      class="back-btn"
      onclick="history.back()">
      ⬅ Επιστροφή
    </button>
  </div>

  <form id="editForm">
    <label>Α/Α e-adeies
      <input name="aa_aitisis"
        type="text"
        required>
    </label>

    <label>Ημερομηνία τελευταίας αξιολόγησης/ελέγχου
      <input name="imnia"
        type="date"
        required>
    </label>

    <label>Ημερομηνία Πράξης
      <input name="imnia_praxis"
        type="date">
    </label>

    <label>Επωνυμία
      <input name="eponimia"
        type="text"
        required>
    </label>

    <label>Είδος δραστηριότητας
      <input name="eidos_drast"
        type="text">
    </label>

    <label>Περιφέρεια
      <input name="perifereia"
        type="text">
    </label>

    <label>Περιοχή
      <input name="perioxi"
        type="text">
    </label>

    <label>Οδός
      <input name="odos"
        type="text">
    </label>

    <label>TK
      <input name="tk"
        type="text">
    </label>

    <label>Τηλέφωνο
      <input name="tilefono"
        type="text">
    </label>

    <label>eMail
      <input name="email"
        type="email">
    </label>

    <label>Αξιολόγηση 1ου Επιπέδου
      <select name="axiologisi_lvl1">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <label>Αξιολόγηση 2ου Επιπέδου
      <select name="axiologisi_lvl2">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <label>Αξιολόγηση 3ου Επιπέδου
      <select name="axiologisi_lvl3">
        <option value="">— Επιλογή —</option>
        <option value="ΧΑΜΗΛΟ">ΧΑΜΗΛΟ</option>
        <option value="ΜΕΣΑΙΟ">ΜΕΣΑΙΟ</option>
        <option value="ΥΨΗΛΟ">ΥΨΗΛΟ</option>
      </select>
    </label>

    <button type="button"
      id="addElegxosBtn"
      style="background:#0d6efd;">
      ➕ Προσθήκη Ελέγχου
    </button>

    <button type="submit">Αποθήκευση</button>
  </form>

  <hr style="margin: 20px 0;" />

  <section id="elegxoiSection">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <h3 style="margin:0;">Έλεγχοι για Α/Α Αίτησης: <span id="elegxoiAaLabel">—</span></h3>
      <button type="button"
        id="refreshElegxoiBtn">🔄 Ανανέωση</button>
    </div>

    <div style="margin-top:10px; overflow:auto;">
      <table border="1"
        cellpadding="6"
        cellspacing="0"
        style="width:100%; background:white;">
        <thead>
          <tr>
            <th>Ημ/νία</th>
            <th>Επίπεδο</th>
            <th>Συμμόρφωση</th>
            <th>Πρόστιμο</th>
            <th>Αξιωματικοί</th>
            <th>Προθεσμία</th>
            <th>Παρατηρήσεις</th>
            <th>Ενέργειες</th>
          </tr>
        </thead>
        <tbody id="elegxoiTbody">
          <tr>
            <td colspan="8">—</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');

    async function loadRecord() {
      const response = await fetch('/api/axiologiseis/' + recordId);
      const record = await response.json();

      const form = document.getElementById('editForm');
      for (const key in record) {
        if (form.elements[key]) {
          form.elements[key].value = record[key];
        }
      }

      const aa = document.querySelector('input[name="aa_aitisis"]').value?.trim();
      loadElegxoiForAa(aa);
    }

    document.getElementById('editForm').addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch('/api/axiologiseis/' + recordId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        alert('Επιτυχής ενημέρωση!');
        window.location.href = 'list.html';
      } else {
        alert('Error updating record.');
      }
    });

    document.getElementById('addElegxosBtn').addEventListener('click', () => {
      const aa = document.querySelector('input[name="aa_aitisis"]').value?.trim();
      if (!aa) {
        alert('Συμπλήρωσε πρώτα το aa_aitisis για να συσχετιστεί ο έλεγχος.');
        return;
      }
      // περνάμε και το recordId (id της αξιολόγησης) για να γυρίσουμε πίσω στο edit μετά την αποθήκευση
      window.location.href = `elegxos_new.html?aa_aitisis=${encodeURIComponent(aa)}&axiologisi_id=${encodeURIComponent(recordId)}`;
    });

    async function loadElegxoiForAa(aa) {
      const label = document.getElementById("elegxoiAaLabel");
      const tbody = document.getElementById("elegxoiTbody");

      label.textContent = aa || "—";
      tbody.innerHTML = `<tr><td colspan="8">Φόρτωση...</td></tr>`;

      if (!aa) {
        tbody.innerHTML = `<tr><td colspan="8">Δεν υπάρχει aa_aitisis.</td></tr>`;
        return;
      }

      const resp = await fetch(`/api/elegxoi?aa_aitisis=${encodeURIComponent(aa)}`);
      if (!resp.ok) {
        tbody.innerHTML = `<tr><td colspan="8">Σφάλμα ανάκτησης ελέγχων.</td></tr>`;
        return;
      }

      const rows = await resp.json();

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8">Δεν υπάρχουν έλεγχοι.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => {
        const symm = Number(r.symmorfosi) ? "ΝΑΙ" : "ΟΧΙ";
        const pros = Number(r.prostimo) ? "ΝΑΙ" : "ΟΧΙ";
        const proth = (r.prothesmia === null || r.prothesmia === undefined) ? "" : r.prothesmia;

        // μικρό κόψιμο για να μη “απλώνει” ο πίνακας
        const par = (r.paratiriseis || "");
        
        return `
      <tr>
        <td>${r.imnia_elegxou || ""}</td>
        <td>${r.apotelesma_lvl3 || ""}</td>
        <td>${symm}</td>
        <td>${pros}</td>
        <td>${(r.axiomatikoi || "")}</td>
        <td style="text-align:center;">${proth}</td>
        <td style="white-space: pre-wrap; word-break: break-word;">${escapeHtml(par)}</td>
        <td style="white-space:nowrap;">
          <button type="button" data-del-elegxos-id="${r.id}">🗑 Διαγραφή</button>
        </td>
      </tr>
    `;
      }).join("");

      // bind delete buttons
      tbody.querySelectorAll("button[data-del-elegxos-id]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-del-elegxos-id");
          const ok = confirm("Να διαγραφεί αυτός ο έλεγχος;");
          if (!ok) return;

          const delResp = await fetch(`/api/elegxoi/${encodeURIComponent(id)}`, { method: "DELETE" });
          if (!delResp.ok) {
            alert("Σφάλμα διαγραφής.");
            return;
          }

          await loadElegxoiForAa(aa);
        });
      });
    }

    // helper για ασφαλές render σε HTML
    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Load record on page load
    loadRecord();
  </script>

</body>

</html>
