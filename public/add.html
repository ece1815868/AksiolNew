<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add New Record</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px 20px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    label {
      display: flex;
      flex-direction: column;
      font-weight: bold;
    }

    input {
      padding: 6px 10px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      grid-column: span 2;
      padding: 10px;
      background: #007bff;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <h2>Προσθήκη νέας αξιολόγησης</h2>

  <form id="addForm">
    <label>Α/Α e-adeies
      <input name="aa_aitisis"
        type="text"
        required>
    </label>

    <label>Ημερομηνία Πράξης
      <input name="imnia_praxis"
        type="date">
    </label>

    <label>Επωνυμία
      <input name="eponimia"
        type="text"
        required>
    </label>

    <label>Είδος δραστηριότητας
      <input name="eidos_drast"
        type="text"
        required>
    </label>

    <label>Περιφέρεια
      <input name="perifereia"
        type="text">
    </label>

    <label>Περιοχή
      <input name="perioxi"
        type="text">
    </label>

    <label>Οδός
      <input name="odos"
        type="text"
        required>
    </label>

    <label>TK
      <input name="tk"
        type="text">
    </label>

    <label>Τηλέφωνο
      <input name="tilefono"
        type="text">
    </label>

    <label>eMail
      <input name="email"
        type="email">
    </label>

    <button type="submit">Αποθήκευση</button>
    <button type="button"
      class="back-btn"
      onclick="goBack()">Επιστροφή</button>
  </form>

  <script>

    function goBack() {
      // Go back to the previous page or to list.html if preferred
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = 'list.html';
      }
    }

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch('/api/axiologiseis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {

        alert('Η εγγραφή αποθηκεύτηκε.');
        window.location.href = 'list.html';

      } else {

        const err = await response.json().catch(() => ({}));

        if (err.error) {
          alert(err.error);
        } else {
          alert('Σφάλμα αποθήκευσης.');
        }

      }
    });
  </script>

</body>

</html>
