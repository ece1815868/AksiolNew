<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Λίστα Αξιολογήσεων</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      max-width: 100%;
      margin: 0 auto;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    table {
      width: 100%;
      table-layout: fixed;
      /* Forces columns to stay within width */
      word-wrap: normal;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    /* Filter input styles */
    .filters input {
      width: 90%;
      padding: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }

    th {
      background-color: #007bff;
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #e9ecef;
    }

    .button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      margin: 0 0px;
    }

    .button-edit {
      background-color: #ffffff;
    }

    .button-edit:hover {
      background-color: #acacac;
    }

    .button-excel {
      background-color: #ffffff;
    }

    .button-excel:hover {
      background-color: #acacac;
    }

    .button-delete {
      background-color: #ffffff;
    }

    .button-delete:hover {
      background-color: #acacac;
    }

    .top-buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .top-buttons a {
      text-decoration: none;
      padding: 8px 15px;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      font-weight: bold;
    }

    .top-buttons a:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Λίστα αξιολογήσεων</h1>

    <div class="top-buttons">
      <a href="index.html">🏠 Αρχική</a>
      <a href="add.html">➕ Προσθήκη</a>

      <a href="due.html">⏳ Προθεσμίες</a>
    </div>

    <div id="counter"
      style="margin: 10px 0; font-weight: bold;">Εγγραφές: 0
    </div>

    <table id="recordsTable">
      <colgroup>
        <col style="width: 5%;"> <!-- a/a -->
        <col style="width: 5%;"> <!-- AA eadeies -->
        <col style="width: 6%;"> <!-- HMNIA -->
        <col style="width: 20%;"> <!-- Eidos -->
        <col style="width: 20%;"> <!-- Dhmos -->
        <col style="width: 20%;"> <!-- odos -->
        <col style="width: 5%;"> <!-- aks 1ou -->
        <col style="width: 5%;"> <!-- aks 2ou -->
        <col style="width: 5%;"> <!-- aks 3ou -->
        <col style="width: 10%;"> <!-- Actions -->
      </colgroup>
      <thead>
        <tr>
          <th>Α/Α</th>
          <th>A/Α e-adeies</th>
          <th>Ημερομηνία</th>
          <th>Επωνυμία</th>
          <th>Είδος δραστηριότητας</th>
          <th>Οδός</th>
          <th>Αξ. 1ου</th>
          <th>Αξ. 2ου</th>
          <th>Αξ. 3ου</th>
          <th>Ενέργειες</th>
        </tr>
        <tr class="filters">
          <th><input type="text"
              placeholder="Α/Α" /></th>
          <th><input type="text"
              placeholder="A/Α e-adeies" /></th>
          <th><input type="text"
              placeholder="Ημερομηνία" /></th>
          <th><input type="text"
              placeholder=" Επωνυμία" /></th>
          <th><input type="text"
              placeholder="Είδος δραστηριότητας" /></th>
          <th><input type="text"
              placeholder="Οδός" /></th>
          <th><input type="text"
              placeholder="Αξ. 1ου" /></th>
          <th><input type="text"
              placeholder="Αξ. 2ου" /></th>
          <th><input type="text"
              placeholder="Αξ. 3ου" /></th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be populated by JavaScript -->
      </tbody>
    </table>
  </div>

  <script>
    async function loadRecords() {
      const tbody = document.querySelector('#recordsTable tbody');
      tbody.innerHTML = '';
      const res = await fetch('/api/axiologiseis');
      const records = await res.json();

      updateCounter(records.length);

      records.forEach(record => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td>${record.id}</td>
      <td>${record.aa_aitisis}</td>
      <td>${record.imnia}</td>
      <td class="wrap">${record.eponimia}</td>
      <td class="wrap">${record.eidos_drast}</td>
      <td>${record.odos}, ${record.perifereia}</td>
      <td>${record.axiologisi_lvl1}</td>
      <td>${record.axiologisi_lvl2}</td>
      <td>${record.axiologisi_lvl3}</td>
      <td>
        <button class="button button-edit" onclick="editRecord(${record.id})" title="Επεξεργασία Εγγραφής">🖊️</button>
        <button class="button button-excel" onclick="exportToExcel(${record.id})" title="Εξαγωγή Excel">📋</button>
        <button class="button button-delete" onclick="deleteRecord(${record.id})" title="Διαγραφή">❌</button>
      </td>
    `;
        tbody.appendChild(tr);
      });
    }

    function editRecord(id) {
      window.location.href = `edit.html?id=${id}`;
    }

    async function deleteRecord(id) {
      if (confirm('Επιθυμέτε να διαγράψετε την εγγραφή?')) {
        const res = await fetch(`/api/axiologiseis/${id}`, { method: 'DELETE' });
        if (res.ok) loadRecords();
        else alert('Failed to delete record');
      }
    }

    function exportToExcel(id) {
      window.open(`/api/axiologiseis/${id}/excel`, "_blank");
    }

    function updateCounter(count) {
      const counter = document.getElementById('counter');
      if (counter) {
        counter.textContent = `Εγγραφές: ${count}`;
      }
    }

    function applyFilters() {
      const rows = document.querySelectorAll('#recordsTable tbody tr');
      let visibleCount = 0;

      rows.forEach(row => {
        let show = true;

        filterInputs.forEach((input, colIndex) => {
          const filter = input.value.trim().toLowerCase();
          if (!filter) return; // άδειο φίλτρο -> αγνόησέ το

          const cell = row.cells[colIndex];
          const text = (cell?.textContent || '').toLowerCase();

          if (!text.includes(filter)) {
            show = false;
          }
        });

        row.style.display = show ? '' : 'none';
        if (show) visibleCount++;
      });

      updateCounter(visibleCount);
    }

    const filterInputs = document.querySelectorAll('.filters input');

    filterInputs.forEach(input => {
      input.addEventListener('keyup', applyFilters);
    });

    // Load records on page load
    loadRecords();
    applyFilters();
  </script>

</body>

</html>
